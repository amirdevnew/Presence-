<html>
    <head>
        <title>Web Absensi | Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="MyLibrary/bootstrap.min.css"/>
        <script src="MyLibrary/jquery-3.6.0.min.js"></script>
        <script src="MyLibrary/popper.min.js"></script>
        <script src="MyLibrary/bootstrap.min.js"></script>
        <link rel="stylesheet" href="MyLibrary/datatables.min.css">
        <link rel="stylesheet" href="style.css">
        <script src="MyLibrary/datatables.min.js"></script>
        
        <script type="text/javascript" src="auth.js"></script>
    </head>
    <body class="authPage">

        <div class="box-login  mx-auto my-5 container p-4">

            <div class="row">
                <div class="col-12 text-center">
                    <h3>Login Page</h3>
                </div>
            </div>

            <div class="row justify-content-center my-4">
                <div class="col-md-6 col-12">
                    <input type="email" class="form-control myinput" value="" id="email" name="email" placeholder="Email">
                </div>
            </div>


            <div class="row justify-content-center my-4">
                <div class="col-md-6 col-12">
                    <input type="password" class="form-control myinput" value="" id="password" name="password" placeholder="Password">
                </div>
            </div>

            <div class="row justify-content-center text-center my-4">
                <div class="col">
                    <p class="color-orange">
                        Dont have an account? <a href="register.html">Sign up here!</a>
                    </p>
                </div>
            </div>

            <div class="row justify-content-center my-4">
                <div class="col-md-6 col-12">
                    <button type="button" name="submit" class="btn myinput btn-login btn-primary w-100">Login!</button>
                </div>
            </div>
        </div>
    </body>
</html>
